services:
  - type: web
    name: healthkee-backend
    runtime: node
    plan: free
    branch: main
    rootDir: backend             # ← This is the key fix! Makes Render cd into backend/ automatically
    buildCommand: npm install
    startCommand: node server.js  # Adjust if your entry file is e.g. src/server.js or index.js
    autoDeployTrigger: commit
    # Optional: add these once it's live
    # envVars:
    #   - key: NODE_ENV
    #     value: production
    #   - key: PORT
    #     valueFrom: automatic   # Render injects PORT env var automatically
